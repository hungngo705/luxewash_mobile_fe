<!DOCTYPE html>

<html lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Thanh toán - LuxeWash</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&amp;family=Inter:wght@400;500;700&amp;family=Sora:wght@600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary-fixed": "#c3e8ff",
                        "on-primary": "#ffffff",
                        "surface-bright": "#f7f9fb",
                        "on-error": "#ffffff",
                        "on-tertiary-fixed-variant": "#004d66",
                        "inverse-on-surface": "#eff1f3",
                        "surface-container-low": "#f2f4f6",
                        "secondary": "#545f73",
                        "on-surface": "#191c1e",
                        "secondary-fixed-dim": "#bcc7de",
                        "inverse-surface": "#2d3133",
                        "on-secondary": "#ffffff",
                        "on-secondary-fixed-variant": "#3c475a",
                        "tertiary-container": "#50a9d0",
                        "secondary-fixed": "#d8e3fb",
                        "on-error-container": "#93000a",
                        "tertiary-fixed-dim": "#7bd1fa",
                        "surface-container": "#eceef0",
                        "surface-variant": "#e0e3e5",
                        "outline": "#6f787f",
                        "on-background": "#191c1e",
                        "on-tertiary-fixed": "#001e2b",
                        "error": "#ba1a1a",
                        "surface": "#f7f9fb",
                        "primary": "#006689",
                        "surface-container-high": "#e6e8ea",
                        "on-tertiary": "#ffffff",
                        "background": "#f7f9fb",
                        "primary-container": "#4aa9d7",
                        "error-container": "#ffdad6",
                        "primary-fixed-dim": "#7ad1ff",
                        "on-secondary-fixed": "#111c2d",
                        "on-primary-fixed": "#001e2c",
                        "surface-container-lowest": "#ffffff",
                        "on-tertiary-container": "#003b4f",
                        "surface-dim": "#d8dadc",
                        "outline-variant": "#bec8cf",
                        "on-primary-fixed-variant": "#004c68",
                        "inverse-primary": "#7ad1ff",
                        "secondary-container": "#d5e0f8",
                        "surface-tint": "#006689",
                        "surface-container-highest": "#e0e3e5",
                        "on-surface-variant": "#3f484e",
                        "on-primary-container": "#003b51",
                        "tertiary": "#006686",
                        "on-secondary-container": "#586377",
                        "tertiary-fixed": "#c0e8ff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "lg": "24px",
                        "container-margin": "20px",
                        "base": "8px",
                        "xs": "4px",
                        "md": "16px",
                        "gutter": "16px",
                        "sm": "12px",
                        "xl": "32px"
                    },
                    "fontFamily": {
                        "headline-lg": ["Sora"],
                        "body-md": ["Inter"],
                        "body-lg": ["Inter"],
                        "display-lg": ["Sora"],
                        "label-sm": ["Geist"],
                        "headline-md": ["Sora"],
                        "headline-lg-mobile": ["Sora"],
                        "label-md": ["Geist"]
                    },
                    "fontSize": {
                        "headline-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "body-lg": ["18px", { "lineHeight": "28px", "fontWeight": "400" }],
                        "display-lg": ["48px", { "lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "label-sm": ["12px", { "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600" }],
                        "headline-md": ["24px", { "lineHeight": "32px", "fontWeight": "600" }],
                        "headline-lg-mobile": ["28px", { "lineHeight": "36px", "fontWeight": "600" }],
                        "label-md": ["14px", { "lineHeight": "20px", "letterSpacing": "0.02em", "fontWeight": "500" }]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-outlined.fill {
            font-variation-settings: 'FILL' 1;
        }
        
        /* Premium Radio Button Styles */
        input[type="radio"] {
            appearance: none;
            background-color: transparent;
            margin: 0;
            font: inherit;
            color: currentColor;
            width: 1.15em;
            height: 1.15em;
            border: 1.5px solid #6f787f; /* outline */
            border-radius: 50%;
            display: grid;
            place-content: center;
            transition: all 0.2s ease-in-out;
        }

        input[type="radio"]::before {
            content: "";
            width: 0.65em;
            height: 0.65em;
            border-radius: 50%;
            transform: scale(0);
            transition: 120ms transform ease-in-out;
            box-shadow: inset 1em 1em #4aa9d7; /* primary-container */
        }

        input[type="radio"]:checked {
            border-color: #4aa9d7; /* primary-container */
        }

        input[type="radio"]:checked::before {
            transform: scale(1);
        }
    </style>
<style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>
<body class="bg-background text-on-surface antialiased flex flex-col min-h-screen">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-white/70 backdrop-blur-md shadow-sm flex justify-between items-center px-container-margin h-16 w-full">
<button class="text-primary hover:opacity-80 transition-opacity active:scale-95 transition-transform">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="font-headline-md text-headline-md font-bold text-primary">Thanh toán</h1>
<div class="w-6 h-6"></div> <!-- Spacer for centering -->
</header>
<!-- Main Content Canvas -->
<main class="flex-grow pt-[80px] pb-[120px] px-container-margin flex flex-col gap-lg">
<!-- 1. Service Summary -->
<section class="bg-white/60 backdrop-blur-md rounded-xl p-md shadow-sm border border-outline-variant/30">
<div class="flex items-start gap-md mb-sm">
<div class="w-12 h-12 rounded-lg bg-surface-container-low flex items-center justify-center border border-outline-variant/30 flex-shrink-0">
<span class="material-symbols-outlined text-[#4aa9d7] text-[28px] fill">local_car_wash</span>
</div>
<div class="flex-grow">
<h2 class="font-body-lg text-body-lg font-bold text-on-surface mb-xs">Rửa xe cao cấp</h2>
<div class="flex items-center text-on-surface-variant font-body-md gap-xs mb-xs">
<span class="material-symbols-outlined text-[16px]">calendar_today</span>
<span>15/10/2023</span>
<span class="mx-1">•</span>
<span class="material-symbols-outlined text-[16px]">schedule</span>
<span>10:00 AM</span>
</div>
</div>
</div>
</section>
<!-- 2. Payment Methods -->
<section>
<h3 class="font-label-md text-label-md font-bold text-on-surface-variant uppercase tracking-wider mb-sm">Phương thức thanh toán</h3>
<div class="flex flex-col gap-sm">
<!-- Option: Wallet -->
<label class="flex items-center justify-between bg-white/60 backdrop-blur-md p-md rounded-xl cursor-pointer hover:bg-white/80 transition-colors border border-outline-variant/30 shadow-sm">
<div class="flex items-center gap-sm">
<div class="w-10 h-10 rounded-full bg-primary-container/20 flex items-center justify-center">
<span class="material-symbols-outlined text-[#4aa9d7]">account_balance_wallet</span>
</div>
<div>
<div class="font-body-md font-semibold text-on-surface">Số dư ví</div>
<div class="font-label-sm text-on-surface-variant">500.000 VND</div>
</div>
</div>
<input checked="" name="payment_method" type="radio" value="wallet"/>
</label>
<!-- Option: Bank Transfer -->
<label class="flex flex-col bg-white/60 backdrop-blur-md p-md rounded-xl cursor-pointer hover:bg-white/80 transition-colors border border-outline-variant/30 shadow-sm gap-sm group">
<div class="flex items-center justify-between">
<div class="flex items-center gap-sm">
<div class="w-10 h-10 rounded-full bg-surface-container flex items-center justify-center">
<span class="material-symbols-outlined text-on-surface">account_balance</span>
</div>
<div class="font-body-md font-semibold text-on-surface">Chuyển khoản ngân hàng</div>
</div>
<input name="payment_method" type="radio" value="bank"/>
</div>
<!-- Expanded Bank List -->
<div class="pl-[56px] hidden group-has-[:checked]:block transition-all">
<div class="flex gap-sm">
<div class="px-sm py-xs border border-outline-variant/50 rounded-md font-label-sm text-on-surface-variant flex items-center gap-xs bg-white">
<span class="material-symbols-outlined text-[14px]">account_balance</span> Vietcombank
                            </div>
<div class="px-sm py-xs border border-outline-variant/50 rounded-md font-label-sm text-on-surface-variant flex items-center gap-xs bg-white">
<span class="material-symbols-outlined text-[14px]">account_balance</span> Techcombank
                            </div>
</div>
</div>
</label>
</div>
</section>
<!-- 3. Voucher -->
<section>
<h3 class="font-label-md text-label-md font-bold text-on-surface-variant uppercase tracking-wider mb-sm">Khuyến mãi</h3>
<div class="bg-white/60 backdrop-blur-md rounded-xl p-2 flex items-center border border-outline-variant/30 focus-within:border-[#4aa9d7] transition-colors h-14 shadow-sm">
<span class="material-symbols-outlined text-[#4aa9d7] mx-sm">local_activity</span>
<input class="bg-transparent border-none outline-none flex-grow font-body-md text-on-surface placeholder:text-on-surface-variant/70 focus:ring-0 min-w-0" placeholder="Mã giảm giá/Voucher" type="text"/>
<button class="font-label-md font-bold text-[#4aa9d7] px-sm py-xs hover:bg-[#4aa9d7]/10 rounded-md transition-colors whitespace-nowrap flex-shrink-0">ÁP DỤNG</button>
</div>
</section>
<!-- 4. Billing Details -->
<section class="bg-white/60 backdrop-blur-md rounded-xl p-md border border-outline-variant/30 shadow-sm">
<h3 class="font-label-md text-label-md font-bold text-on-surface-variant uppercase tracking-wider mb-md border-b border-outline-variant/30 pb-sm">Chi tiết thanh toán</h3>
<div class="flex flex-col gap-sm font-body-md mb-md">
<div class="flex justify-between items-center">
<span class="text-on-surface-variant">Giá gốc</span>
<span class="text-on-surface font-medium">150.000 VND</span>
</div>
<div class="flex justify-between items-center">
<span class="text-on-surface-variant">Mã giảm giá/Voucher</span>
<span class="text-[#4aa9d7] font-medium">- 20.000 VND</span>
</div>
</div>
<div class="flex justify-between items-center border-t border-outline-variant/30 pt-md">
<span class="font-body-lg font-semibold text-on-surface">Tổng thanh toán</span>
<span class="font-headline-md text-headline-md font-bold text-[#4aa9d7]">130.000 VND</span>
</div>
</section>
</main>
<!-- 5. Bottom Action -->
<div class="fixed bottom-0 left-0 w-full p-container-margin bg-white/80 backdrop-blur-lg shadow-[0_-10px_30px_rgb(0,0,0,0.05)] z-40 pb-safe border-t border-outline-variant/20">
<button class="w-full bg-[#4aa9d7] text-white font-label-md font-bold text-[14px] uppercase tracking-widest py-4 rounded-xl shadow-[0_4px_15px_rgba(74,169,215,0.3)] hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-sm">
<span class="material-symbols-outlined text-[20px]">lock</span>
            THANH TOÁN NGAY
        </button>
</div>
</body></html>
