<div class="fixed inset-0 bg-mesh -z-10"></div>
<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-margin-mobile h-16 bg-surface/80 backdrop-blur-xl border-b border-outline-variant/30">

</div>

</div>
</div>
<div class="space-y-2 group neon-glow rounded-xl">
<label class="font-label-sm text-label-sm text-on-surface-variant px-1">Số điện thoại</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant text-[20px]">smartphone</span>
<input class="w-full bg-surface-container-lowest border border-outline-variant/50 rounded-xl py-3.5 pl-12 pr-4 text-on-surface placeholder:text-outline focus:ring-1 focus:ring-primary focus:border-primary transition-all" placeholder="090 123 4567" type="tel">
</div>
</div>
<div class="space-y-2 group neon-glow rounded-xl">
<label class="font-label-sm text-label-sm text-on-surface-variant px-1">Email</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant text-[20px]">mail</span>
<input class="w-full bg-surface-container-lowest border border-outline-variant/50 rounded-xl py-3.5 pl-12 pr-4 text-on-surface placeholder:text-outline focus:ring-1 focus:ring-primary focus:border-primary transition-all" placeholder="example@luxewash.vn" type="email">
</div>
</div>
<div class="space-y-2 group neon-glow rounded-xl">
<label class="font-label-sm text-label-sm text-on-surface-variant px-1">Mật khẩu</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant text-[20px]">lock</span>
<input class="w-full bg-surface-container-lowest border border-outline-variant/50 rounded-xl py-3.5 pl-12 pr-12 text-on-surface placeholder:text-outline focus:ring-1 focus:ring-primary focus:border-primary transition-all" placeholder="••••••••" type="password">
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>
<div class="space-y-2 group neon-glow rounded-xl">

</div>

                Đăng ký ngay
